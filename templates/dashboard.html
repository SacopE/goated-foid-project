{% extends "base.html" %}

{% block content %}

<h2>Your Dashboard</h2>

<h3>Welcome, {{ username }}!</h3>

<!-- TODO: Add a button or link to create a new entry -->
<a href="/create">Create New Entry</a>

<br><br>

<!-- TODO: Loop through entries passed from Flask -->
<!-- The variable "entries" will come from your Flask route -->
<!-- Example structure: -->

{% for entry in entries %}
    <div>
        <h3>{{ entry['exercise'] }}</h3>
        <p> Weight: {{ entry['weight'] }}</p>
        <p>Reps: {{ entry['reps'] }}</p>
        <p>Date: {{ entry['date'] }}</p>

        <a href="{{ url_for('edit', id=entry['id']) }}">Edit</a>

        <a href="/delete/{{ entry['id'] }}">Delete</a>

    </div>
    <hr>
{% endfor %}

<!-- TODO: If no entries exist, display a message like:
"No entries yet!" -->

<br>

<!-- TODO: Add a logout button -->
<a href="/logout"><button>Logout</button></a>

{% endblock %}
